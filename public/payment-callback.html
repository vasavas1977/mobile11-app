<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Payment - Mobile11</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #10b981 0%, #0d9488 50%, #059669 100%);
      color: white;
    }
    .loader { 
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h2>Processing your payment...</h2>
    <p>Please wait while we redirect you.</p>
  </div>
  <script>
    // Get all query parameters from the current URL
    const params = window.location.search;
    // Redirect to the SPA route with the same parameters
    window.location.replace('/payment-success' + params);
  </script>
</body>
</html>
