apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.mobile11.app"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.mobile11.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode project.hasProperty('versionCode') ? project.property('versionCode').toInteger() : 1
        versionName project.hasProperty('versionName') ? project.property('versionName') : "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            if (System.env.ANDROID_KEYSTORE_PASSWORD) {
                storeFile file("mobile11-release.keystore")
                storePassword System.env.ANDROID_KEYSTORE_PASSWORD
                keyAlias System.env.ANDROID_KEY_ALIAS
                keyPassword System.env.ANDROID_KEYSTORE_PASSWORD
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig System.env.ANDROID_KEYSTORE_PASSWORD ? signingConfigs.release : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation project(':capacitor-android')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"

    // Google Pay
    implementation 'com.google.android.gms:play-services-wallet:19.3.0'

    // Firebase Cloud Messaging
    implementation platform('com.google.firebase:firebase-bom:33.0.0')
    implementation 'com.google.firebase:firebase-messaging'

    // Biometric
    implementation 'androidx.biometric:biometric:1.1.0'
}

apply from: 'capacitor.build.gradle'

// Apply Google Services plugin (must be at bottom)
try {
    apply plugin: 'com.google.gms.google-services'
} catch (Exception e) {
    logger.warn("google-services plugin not found — FCM push will not work until configured")
}
