workflows:
  # ═══════════════════════════════════════════════════════════════════
  # iOS — Build, sign, and upload to TestFlight / App Store
  # ═══════════════════════════════════════════════════════════════════
  ios-release:
    name: Mobile11 iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic  # Set up in Codemagic Team settings
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mobile11.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 0000000000  # Replace with your App Store Connect App ID
      node: v18.20.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      # 1. Install Node dependencies
      - name: Install npm dependencies
        script: |
          npm install

      # 2. Install CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      # 3. Build web assets
      - name: Build web app
        script: |
          npm run build

      # 4. Sync web assets to native project
      - name: Sync Capacitor
        script: |
          npx cap sync ios

      # 5. Set up code signing
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # 6. Increment build number
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $((${LATEST_BUILD_NUMBER} + 1))

      # 7. Build IPA
      - name: Build IPA for distribution
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - nico@mobile11.com  # Replace with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Mobile11 Testers
        # Uncomment when ready to submit to App Store review:
        # submit_to_app_store: true

  # ═══════════════════════════════════════════════════════════════════
  # Android — Build, sign, and upload to Google Play
  # ═══════════════════════════════════════════════════════════════════
  android-release:
    name: Mobile11 Android Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - keystore_reference  # Set up in Codemagic > Environment variables
      groups:
        - google_play  # Must contain GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.mobile11.app"
      node: v18.20.0
      java: 17
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      # 1. Set Android SDK location
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      # 2. Install Node dependencies
      - name: Install npm dependencies
        script: |
          npm install

      # 3. Build web assets
      - name: Build web app
        script: |
          npm run build

      # 4. Sync web assets to native project
      - name: Sync Capacitor
        script: |
          npx cap sync android

      # 5. Set build number
      - name: Set build number
        script: |
          LATEST_GOOGLE_PLAY_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME")
          if [ -z $LATEST_GOOGLE_PLAY_BUILD_NUMBER ]; then
            UPDATED_BUILD_NUMBER=$BUILD_NUMBER
          else
            UPDATED_BUILD_NUMBER=$((${LATEST_GOOGLE_PLAY_BUILD_NUMBER} + 1))
          fi
          echo "BUILD_NUMBER=$UPDATED_BUILD_NUMBER" >> $CM_ENV

      # 6. Build Android App Bundle
      - name: Build Android release
        script: |
          cd $CM_BUILD_DIR/android
          ./gradlew bundleRelease \
            -PversionCode=$BUILD_NUMBER \
            -PversionName=1.0.$BUILD_NUMBER

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - nico@mobile11.com  # Replace with your email
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
